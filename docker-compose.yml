version: '3.1'
services:
  web:
    image: odoo:17.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_password_123
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    restart: always

  # db:
  #   image: postgres:15
  #   environment:
  #     - POSTGRES_DB=postgres
  #     - POSTGRES_PASSWORD=odoo_password_123
  #     - POSTGRES_USER=odoo
  #   volumes:
  #     - odoo-db-data:/var/lib/postgresql/data
  #   restart: always

volumes:
  odoo-web-data:
  odoo-db-data: